<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Relay Messenger (Yandex)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #0d0d0d; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100dvh; height: 100dvh; overflow: hidden; }
    #app-viewport { width: 100%; max-width: 800px; height: 100dvh; display: flex; flex-direction: column; background: #121212; position: relative; }
    @media (min-width: 768px) { #app-viewport { height: 90dvh; max-height: 850px; border-radius: 16px; border: 1px solid #2a2a2a; box-shadow: 0 12px 40px rgba(0,0,0,0.6); overflow: hidden; } }
    header { background: #1a1a1a; padding: 14px 20px; border-bottom: 1px solid #282828; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
    header h3 { font-size: 16px; font-weight: 600; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .status { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: #262626; color: #888; font-weight: 500; transition: all 0.3s ease; }
    .status.online { background: rgba(46, 125, 50, 0.2); color: #81c784; border: 1px solid rgba(76, 175, 80, 0.3); }
    .status.error { background: rgba(183, 28, 28, 0.2); color: #e57373; border: 1px solid rgba(239, 83, 80, 0.3); }
    #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #121212; }
    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.45; word-break: break-word; }
    .msg.my { align-self: flex-end; background: #2e7d32; color: #ffffff; border-bottom-right-radius: 2px; }
    .msg.their { align-self: flex-start; background: #1e1e1e; color: #e0e0e0; border: 1px solid #2a2a2a; border-bottom-left-radius: 2px; }
    .msg .time { font-size: 10px; opacity: 0.65; margin-top: 4px; text-align: right; }
    footer { padding: 14px 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom, 12px)); background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #282828; }
    input[type="text"], input[type="password"], select { background: #0f0f0f; border: 1px solid #2c2c2c; color: #fff; padding: 12px 14px; border-radius: 10px; outline: none; font-size: 14px; }
    footer input[type="text"] { flex: 1; }
    button { background: #2e7d32; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-secondary { background: #262626; color: #ccc; padding: 6px 12px; font-size: 13px; }
    #settings { position: absolute; inset: 0; background: #121212; padding: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 10; overflow-y: auto; }
    #settings label { font-size: 12px; color: #888; }
    .hidden { display: none !important; }
    #debug-log { font-size: 10px; color: #ff8a80; padding: 4px 20px; background: #181818; border-bottom: 1px solid #222; }
  </style>
</head>
<body>

  <div id="app-viewport">
    <div id="settings">
      <h2>⚙️ Настройки Яндекс Облака</h2>
      <label>Яндекс OAuth Токен:</label>
      <input type="password" id="token-input" placeholder="Пароль/Токен из Яндекс OAuth" autocomplete="off">
      <label>Пароль шифрования чата:</label>
      <input type="password" id="secret-input" placeholder="Общий секретный пароль" autocomplete="off">
      <label>Ваше местоположение:</label>
      <select id="role-select">
        <option value="armenia">Я в Армении (Пишу в armenia.json)</option>
        <option value="russia">Я в России (Пишу в russia.json)</option>
      </select>
      <button onclick="saveSettings()" style="margin-top: 12px;">Сохранить и войти</button>
    </div>

    <header>
      <h3>💬 Relay Messenger</h3>
      <div class="header-actions">
        <button onclick="openSettings()" class="btn-secondary">⚙️</button>
        <span id="status-badge" class="status">Оффлайн</span>
      </div>
    </header>
    <div id="debug-log" class="hidden"></div>

    <div id="chat-box"></div>

    <footer>
      <input type="text" id="msg-input" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Отправить</button>
    </footer>
  </div>

  <script>
    let config = JSON.parse(localStorage.getItem('chat_cfg_yandex_v2') || '{}');
    let db, cryptoKey;

    // --- IndexedDB ---
    const request = indexedDB.open("OfflineChatDB_Yandex_v2", 1);
    request.onupgradeneeded = e => {
      db = e.target.result;
      if (!db.objectStoreNames.contains("messages")) {
        db.createObjectStore("messages", { keyPath: "id" });
      }
    };
    request.onsuccess = e => {
      db = e.target.result;
      if (config.secret && config.token) {
        initApp();
      } else {
        openSettings();
      }
    };

    function openSettings() {
      if (config.token) document.getElementById('token-input').value = config.token;
      if (config.secret) document.getElementById('secret-input').value = config.secret;
      if (config.role) document.getElementById('role-select').value = config.role;
      document.getElementById('settings').classList.remove('hidden');
    }

    function saveSettings() {
      const token = document.getElementById('token-input').value.trim();
      const secret = document.getElementById('secret-input').value.trim();
      const role = document.getElementById('role-select').value;

      if (!token || !secret) {
        alert("Укажите токен и пароль!");
        return;
      }

      config = { token, secret, role };
      localStorage.setItem('chat_cfg_yandex_v2', JSON.stringify(config));
      initApp();
    }

    async function initApp() {
      document.getElementById('settings').classList.add('hidden');
      try { cryptoKey = await deriveKey(config.secret); } catch (e) { return; }
      await renderMessages();
      syncWithYandex();
      if (window.syncInterval) clearInterval(window.syncInterval);
      window.syncInterval = setInterval(syncWithYandex, 4000);
    }

    // --- Crypto ---
    async function deriveKey(secret) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(secret), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: enc.encode("yandex_salt_v2"), iterations: 50000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    }

    async function encrypt(text) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(text);
      const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, cryptoKey, encoded);
      return { iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
    }

    async function decrypt(encrypted) {
      try {
        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: new Uint8Array(encrypted.iv) },
          cryptoKey,
          new Uint8Array(encrypted.data)
        );
        return new TextDecoder().decode(decrypted);
      } catch (e) { return null; }
    }

    function getAllMessagesFromDB() {
      return new Promise((resolve) => {
        if (!db) return resolve([]);
        const tx = db.transaction("messages", "readonly");
        const store = tx.objectStore("messages").getAll();
        store.onsuccess = () => resolve(store.result || []);
        store.onerror = () => resolve([]);
      });
    }

    function saveToDB(msg) {
      return new Promise((resolve) => {
        const tx = db.transaction("messages", "readwrite");
        tx.objectStore("messages").put(msg);
        tx.oncomplete = () => resolve();
      });
    }

    async function sendMsg() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      const msg = { 
        id: Date.now().toString(), 
        sender: config.role, 
        text, 
        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
      };

      await saveToDB(msg);
      input.value = '';
      await renderMessages();
      syncWithYandex();
    }

    async function renderMessages() {
      const messages = await getAllMessagesFromDB();
      const box = document.getElementById('chat-box');
      box.innerHTML = '';

      messages.sort((a, b) => Number(a.id) - Number(b.id)).forEach(m => {
        const div = document.createElement('div');
        div.className = `msg ${m.sender === config.role ? 'my' : 'their'}`;
        div.appendChild(document.createTextNode(m.text));
        
        const timeDiv = document.createElement('div');
        timeDiv.className = 'time';
        timeDiv.textContent = m.time;
        div.appendChild(timeDiv);
        
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    }

    function logError(msg) {
      const log = document.getElementById('debug-log');
      if (msg) {
        log.textContent = "Ошибка: " + msg;
        log.classList.remove('hidden');
      } else {
        log.classList.add('hidden');
      }
    }

    // --- Yandex Sync Core ---
    async function syncWithYandex() {
      const badge = document.getElementById('status-badge');
      if (!navigator.onLine) {
        badge.textContent = "Оффлайн";
        badge.className = "status";
        return;
      }

      const sendFileName = config.role === 'armenia' ? 'armenia.json' : 'russia.json';
      const readFileName = config.role === 'armenia' ? 'russia.json' : 'armenia.json';

      try {
        // Создаем папку в приложении/диске
        await fetch(`https://cloud-api.yandex.net/v1/disk/resources?path=app:/RelayChat`, {
          method: 'PUT',
          headers: { 'Authorization': `OAuth ${config.token}` }
        }).catch(() => {});

        // 1. Загрузка исходящих
        const allMsgs = await getAllMessagesFromDB();
        const myMsgs = allMsgs.filter(m => m.sender === config.role);
        const encryptedData = await encrypt(JSON.stringify(myMsgs));
        
        const ok = await uploadFile(`app:/RelayChat/${sendFileName}`, { payload: encryptedData });
        if (!ok) throw new Error("Не удалось записать файл в Яндекс");

        // 2. Скачивание входящих
        const remoteData = await downloadFile(`app:/RelayChat/${readFileName}`);
        if (remoteData && remoteData.payload) {
          const decryptedText = await decrypt(remoteData.payload);
          if (decryptedText) {
            const incomingMsgs = JSON.parse(decryptedText);
            let newCount = 0;
            for (const m of incomingMsgs) {
              const existing = allMsgs.find(x => x.id === m.id);
              if (!existing) {
                await saveToDB(m);
                newCount++;
              }
            }
            if (newCount > 0) await renderMessages();
          }
        }

        badge.textContent = "В сети";
        badge.className = "status online";
        logError(null);
      } catch (err) {
        badge.textContent = "Ошибка";
        badge.className = "status error";
        logError(err.message);
      }
    }

    async function uploadFile(path, dataObj) {
      const res = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/upload?path=${encodeURIComponent(path)}&overwrite=true`, {
        headers: { 'Authorization': `OAuth ${config.token}` }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Ошибка получения ссылки (${res.status})`);
      }
      const { href } = await res.json();
      const putRes = await fetch(href, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dataObj)
      });
      return putRes.ok;
    }

    async function downloadFile(path) {
      const res = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/download?path=${encodeURIComponent(path)}`, {
        headers: { 'Authorization': `OAuth ${config.token}` }
      });
      if (!res.ok) return null;
      const { href } = await res.json();
      const fileRes = await fetch(href);
      return fileRes.ok ? await fileRes.json() : null;
    }
  </script>
</body>
</html>
